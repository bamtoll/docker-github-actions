name: Docker Image Build

on:
  push:
    branches:
      - main          # main 브랜치에 push될 때만 실행

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub이 제공하는 Ubuntu 러너 사용

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Docker 이미지 빌드
      - name: Build Docker image
        run: docker build -t my-docker-app:latest .

      # 3. 빌드된 이미지 확인
      - name: Verify Docker image
        run: docker images my-docker-app

      # 4. 컨테이너 실행 테스트 (백그라운드)
      - name: Run container test
        run: |
          docker run -d -p 3000:3000 --name test-container my-docker-app:latest
          sleep 3
          curl -f http://localhost:3000 || exit 1
          echo "✅ Container responded successfully!"

      # 5. 테스트 컨테이너 정리
      - name: Cleanup
        run: docker rm -f test-container